services:
  - type: web
    name: pricepilot-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPEN_MODEL
        value: stepfun/step-3.5-flash:free
      - key: APP_NAME
        value: PricePilot
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: false